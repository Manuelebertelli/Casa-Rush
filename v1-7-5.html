<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Casa Rush v1.7.5</title>
</head>
<body>
<script>
fetch('v1-7-3.html?ts=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error('Non trovo v1-7-3.html');
    return r.text();
  })
  .then(html => {
    const oldFn = "async function exportTimelinePdf(){show('timeline');await waitRenderFrames();await new Promise(r=>setTimeout(r,120));window.print()}";

    const newFn = `
function exportTimelinePdf(){
  const tasks = (data && data.tasks) ? [...data.tasks] : [];
  const contacts = (data && data.contacts) ? data.contacts : [];

  function esc(v){
    return String(v ?? '').replace(/[&<>"]/g, function(m){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];
    });
  }

  function contactName(id){
    const c = contacts.find(x => x.id === id);
    return c ? c.name : '-';
  }
  function statusClass(t){
  if(['fatto','confermato','post'].includes(t.status)) return 'done';
  if(['bloccante','bloccato'].includes(t.status) || t.critical) return 'blocked';
  return 'progress';
}

function statusLabel(t){
  if(['fatto','confermato','post'].includes(t.status)) return 'Fatto';
  if(['bloccante','bloccato'].includes(t.status) || t.critical) return 'Bloccante';
  return 'In corso';
}
  tasks.sort((a,b) => String(a.start || '').localeCompare(String(b.start || '')));

  const rows = tasks.map(t =>
    '<tr>' +
      '<td>' + esc(t.title) + '</td>' +
      '<td>' + esc(t.lane || '-') + '</td>' +
      '<td>' + esc(contactName(t.contact)) + '</td>' +
      '<td>' + esc(t.start || '-') + '</td>' +
      '<td>' + esc(t.end || '-') + '</td>' +
      '<td class="' + statusClass(t) + '">' + esc(statusLabel(t)) + '</td>' +
      '<td>' + (t.critical ? 'Sì' : 'No') + '</td>' +
      '<td>' + esc((t.blocks || []).join(', ') || '-') + '</td>' +
      '<td>' + esc(t.notes || '') + '</td>' +
    '</tr>'
  ).join('');

  const printHtml =
    '<!doctype html><html lang="it"><head><meta charset="utf-8">' +
    '<title>Casa Rush PDF</title>' +
    '<style>' +
    '@page{size:A4 landscape;margin:10mm}' +
    'body{font-family:Arial,sans-serif;padding:20px;background:white;color:black}' +
    'h1{margin:0 0 6px;font-size:24px}' +
    'p{margin:4px 0 12px;font-size:13px}' +
    'table{width:100%;border-collapse:collapse;font-size:11px}' +
    'th,td{border:1px solid #bbb;padding:6px;text-align:left;vertical-align:top}' +
    'td.done{background:#dff7e8;color:#116b3a;font-weight:bold}' +
    'td.blocked{background:#ffe1e7;color:#9b1230;font-weight:bold}' +
    'td.progress{background:#fff0d8;color:#935100;font-weight:bold}' +
    'th{background:#f0f0f0;font-weight:bold}' +
    'tr{break-inside:avoid;page-break-inside:avoid}' +
    '</style></head><body>' +
    '<h1>Casa Rush – Timeline lavori</h1>' +
    '<p><strong>Esportato il:</strong> ' + new Date().toLocaleDateString('it-IT') + '</p>' +
    '<p><strong>Obiettivo rogito:</strong> 30/05/2026</p>' +
    '<table><thead><tr>' +
    '<th>Attività</th><th>Canale</th><th>Contatto</th><th>Inizio</th><th>Fine</th><th>Stato</th><th>Critica</th><th>Attività bloccate</th><th>Note</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>' +
    '</body></html>';

  const win = window.open('', '_blank');
  if(!win){
    alert('Popup bloccato. Consenti i popup per esportare il PDF.');
    return;
  }

  win.document.open();
  win.document.write(printHtml);
  win.document.close();

  setTimeout(() => {
    win.focus();
    win.print();
  }, 500);
}
`;

    html = html.replace(/v1\.7\.3/g, 'v1.7.5');
    html = html.replace(/v1-7-3/g, 'v1-7-5');
    html = html.replace(oldFn, newFn);

    document.open();
    document.write(html);
    document.close();
  })
  .catch(err => {
    document.body.innerHTML =
      '<h1 style="font-family:sans-serif">Errore v1.7.5</h1>' +
      '<p style="font-family:sans-serif">' + err.message + '</p>';
  });
</script>
</body>
</html>
