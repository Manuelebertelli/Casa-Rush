<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Casa Rush</title><style>
:root{--bg:#070a12;--card:#121a2b;--card2:#172033;--txt:#f8fafc;--mut:#94a3b8;--gold:#d7b56d;--r:#ff5c7a;--o:#ff9f43;--y:#ffd166;--g:#39d98a;--day:52px;--lane:112px}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#25324c,#070a12 58%);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:92px}header{position:sticky;top:0;z-index:10;background:rgba(7,10,18,.92);backdrop-filter:blur(16px);border-bottom:1px solid #ffffff16;padding:14px}h1{margin:0;font-size:24px}.small,.sub{font-size:12px;color:var(--mut)}main{padding:14px;max-width:980px;margin:auto}.top,.row{display:flex;justify-content:space-between;gap:10px;align-items:center}.pill,.badge{border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}.pill{border:1px solid #d7b56d88;color:var(--gold);background:#d7b56d18}.card,.task{background:linear-gradient(180deg,#ffffff11,#ffffff06);border:1px solid #ffffff18;border-radius:22px;padding:14px;margin-bottom:12px}.task{border-radius:18px;background:#0005}.task.danger{border-left:4px solid var(--r)}.task.warn{border-left:4px solid var(--o)}.task.ok{border-left:4px solid var(--g)}.grid,.list{display:grid;gap:10px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{background:#0005;border:1px solid #ffffff14;border-radius:16px;padding:11px}.kpi b{font-size:24px}.big{font-size:44px;font-weight:950}.mut{color:var(--mut)}.title{font-weight:950}.badge.red{background:#ff5c7a22;color:var(--r)}.badge.orange{background:#ff9f4322;color:var(--o)}.badge.yellow{background:#ffd16622;color:var(--y)}.badge.green{background:#39d98a22;color:var(--g)}.badge.gray{background:#94a3b822;color:#cbd5e1}.btn{border:1px solid #ffffff18;background:var(--card2);color:white;border-radius:14px;padding:10px 12px;font-weight:900}.btn.gold{background:linear-gradient(135deg,#f4d88f,#b88735);color:#160e04}.btn.redbtn{background:#ff5c7a22;color:var(--r)}.meta{font-size:12px;color:var(--mut);margin-top:3px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.actions .btn{font-size:12px;padding:8px 9px}.timelineWrap{overflow:auto;background:#0005;border:1px solid #ffffff14;border-radius:18px}.timeline{width:max-content;min-width:100%}.trow{display:grid;grid-auto-rows:38px;min-height:38px;border-bottom:1px solid #ffffff10}.tcell{border-right:1px solid #ffffff10;padding:6px 2px;text-align:center;font-size:10px;color:var(--mut);background:#0e1525}.tcell.rogito{color:#160e04;background:linear-gradient(135deg,#f4d88f,#b88735);font-weight:950}.laneName{padding:9px 7px;font-size:11px;font-weight:950;background:#ffffff08;border-right:1px solid #ffffff12;position:sticky;left:0;z-index:4;backdrop-filter:blur(10px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;grid-row:1}.track{min-height:38px;border-right:1px solid #ffffff10;background:linear-gradient(90deg,#ffffff08 1px,transparent 1px);background-size:var(--day) 100%;grid-row:1}.track.rogitoBg{background-color:#d7b56d12}.clip{align-self:center;margin:5px 2px;height:28px;border-radius:9px;padding:7px 8px;font-size:10px;font-weight:950;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border:1px solid #ffffff60;z-index:3}.clip.r{background:#ff5c7add}.clip.o{background:#ff9f43dd;color:#170b00}.clip.y{background:#ffd166dd;color:#171000}.clip.g{background:#39d98add;color:#03160c}.clip.x{background:#64748bdd}.clip.gold{background:linear-gradient(135deg,#f4d88f,#b88735);color:#160e04}input,select,textarea{width:100%;background:#0006;color:white;border:1px solid #ffffff18;border-radius:14px;padding:11px;font:inherit}textarea{min-height:76px}label{display:block;color:var(--mut);font-size:12px;margin:9px 0 5px}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hide{display:none!important}.modal{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.62);backdrop-filter:blur(10px);display:none;align-items:flex-end}.modal.on{display:flex}.sheet{width:100%;max-height:88vh;overflow:auto;background:linear-gradient(180deg,#172033,#0b111d);border:1px solid #ffffff1d;border-radius:24px 24px 0 0;padding:16px 14px calc(18px + env(safe-area-inset-bottom))}.sheetHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.formGrid{display:grid;gap:8px}.checkRow{display:flex;gap:8px;align-items:center;background:#0004;border:1px solid #ffffff14;border-radius:14px;padding:10px}.checkRow input{width:auto}.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;position:sticky;bottom:0;background:linear-gradient(180deg,transparent,#0b111d 30%);padding-top:12px;margin-top:10px}nav{position:fixed;left:0;right:0;bottom:0;background:rgba(7,10,18,.94);backdrop-filter:blur(16px);border-top:1px solid #ffffff14;padding:8px 7px max(8px,env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(5,1fr);gap:5px}nav button{background:transparent;color:var(--mut);border:0;border-radius:14px;padding:8px 2px;font-size:11px;font-weight:950}nav button.on{background:#d7b56d22;color:var(--gold)}#syncToast{position:fixed;left:14px;right:14px;bottom:88px;background:#111827;border:1px solid #ffffff22;border-radius:16px;padding:12px;z-index:80;display:none}
</style></head><body><header><div class="top"><div><h1>Casa Rush <span class="small">v1.2.0</span></h1><div class="sub" id="syncLine">Apertura app...</div></div><div class="pill" id="left">-- giorni</div></div></header><main><section id="home" class="view grid"></section><section id="timeline" class="view hide"></section><section id="tasks" class="view hide"></section><section id="contacts" class="view hide"></section><section id="dataSec" class="view hide"></section></main><div id="editorModal" class="modal"><div class="sheet"><div class="sheetHead"><div><h2 id="modalTitle">Modifica</h2><div class="sub" id="modalHint">Menu + inserimento manuale.</div></div><button class="btn" onclick="closeModal()">Chiudi</button></div><div id="modalBody"></div></div></div><div id="syncToast"></div><nav><button class="on" data-v="home">🏠<br>Home</button><button data-v="timeline">🎚️<br>Timeline</button><button data-v="tasks">✅<br>Attività</button><button data-v="contacts">👥<br>Contatti</button><button data-v="dataSec">☁️<br>Sync</button></nav><script>
const API='https://script.google.com/macros/s/'+'AKfycbzT6FxIdlwqUHQbvYVpUTPXZUgT3lLDIEUQ9WNejStZcStc_fw2hgOzQufAuQZbgyk/exec',KEY='casaRushFullV2',START='2026-05-03',TARGET='2026-05-30',APP_VERSION='1.2.0';
const statusOptions=[['fatto','Fatto'],['confermato','Confermato'],['da_confermare','Da confermare'],['rischio','A rischio'],['bloccante','Bloccante'],['bloccato','Bloccato'],['post','Post-rogito OK']];
const laneDefaults=['Geometra','Bagni','Idraulico','Elettrico','Luci','Costruttore','Pulizie','Cucina','Notaio','Extra'];
const seed={contacts:[{id:'lorenzo',name:'Lorenzo Severino',role:'Geometra',phone:'',email:'',notes:'APE / mutuo'}],tasks:[{id:'ape',title:'APE energetica',lane:'Geometra',contact:'lorenzo',start:'2026-05-03',end:'2026-05-10',status:'bloccante',critical:true,blocks:['Mutuo','Rogito'],sol:0,last:'',notes:'Documento urgente.',msg:''},{id:'rogito',title:'Rogito',lane:'Notaio',contact:'lorenzo',start:'2026-05-30',end:'2026-05-30',status:'da_confermare',critical:true,blocks:[],sol:0,last:'',notes:'Obiettivo finale.',msg:''}]};
let data=load(),saveTimer=null,isSaving=false,isLoading=false,lastCloudSig='',lastLocalEdit=0,hasLoadedCloud=false;function clone(o){return JSON.parse(JSON.stringify(o))}function load(){try{return JSON.parse(localStorage.getItem(KEY))||clone(seed)}catch(e){return clone(seed)}}function localSave(){localStorage.setItem(KEY,JSON.stringify(data))}function markChanged(){lastLocalEdit=Date.now();localSave();render();scheduleCloudSave()}function scheduleCloudSave(){setSync('Modifica rilevata: salvataggio automatico...');clearTimeout(saveTimer);saveTimer=setTimeout(saveCloudAuto,800)}function $(id){return document.getElementById(id)}function setSync(t){$('syncLine').textContent=t;let s=$('syncState');if(s)s.textContent=t}function today(){return new Date().toISOString().slice(0,10)}function dd(a,b){return Math.round((new Date(b+'T12:00')-new Date(a+'T12:00'))/864e5)}function fmt(d){return d?new Date(d+'T12:00').toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}):'—'}function c(id){return data.contacts.find(x=>x.id===id)||{name:'—',phone:''}}function sig(){return JSON.stringify(data)}function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function badge(s){let m={fatto:['green','Fatto'],confermato:['green','Confermato'],da_confermare:['yellow','Da confermare'],rischio:['orange','A rischio'],bloccante:['red','Bloccante'],bloccato:['red','Bloccato'],post:['gray','Post-rogito OK']};let a=m[s]||['yellow',s||'Da definire'];return `<span class="badge ${a[0]}">${a[1]}</span>`}function risk(){let crit=data.tasks.filter(t=>t.critical),open=crit.filter(t=>!['fatto','confermato'].includes(t.status)).length,blk=crit.filter(t=>['bloccante','bloccato','rischio'].includes(t.status)).length;let score=Math.max(5,100-open*14-blk*10);return{score,label:score>=75?'Realistico':score>=55?'Realistico ma da presidiare':score>=35?'Rischio alto':'Posticipo probabile',open,blk}}
function card(t){let cls=['bloccante','bloccato'].includes(t.status)?'danger':t.status==='rischio'?'warn':['fatto','confermato'].includes(t.status)?'ok':'';return `<div class="task ${cls}"><div class="row"><div><div class="title">${esc(t.title)}</div><div class="meta">${esc(c(t.contact).name)} · ${fmt(t.start)} → ${fmt(t.end)} · solleciti: ${t.sol||0}</div></div>${badge(t.status)}</div><p class="small mut">${esc(t.notes||'')}</p><div class="small">Blocca: ${(t.blocks||[]).map(esc).join(', ')||'—'}</div><div class="actions"><button class="btn" onclick="wa('${t.id}')">WhatsApp</button><button class="btn" onclick="sol('${t.id}')">+ Sollecito</button><button class="btn" onclick="done('${t.id}')">Fatto</button><button class="btn" onclick="editTask('${t.id}')">Modifica</button></div></div>`}
function render(){if(!$('home'))return;$('left').textContent=Math.max(0,dd(today(),TARGET))+' giorni';let r=risk();$('home').innerHTML=`<div class="card"><div class="row"><div><h2>Stato rogito</h2><div class="small">Obiettivo 30 maggio · v${APP_VERSION}</div></div>${badge(r.score>55?'da_confermare':'rischio')}</div><div class="big">${r.score}%</div><div class="mut">${r.label}</div><div class="kpis"><div class="kpi"><b>${r.open}</b><div class="small">critiche aperte</div></div><div class="kpi"><b>${r.blk}</b><div class="small">blocchi/rischi</div></div></div></div><div class="card"><h2>Da rompere oggi</h2><div class="list">${data.tasks.filter(t=>t.critical&&!['fatto','confermato'].includes(t.status)).slice(0,5).map(card).join('')}</div></div>`;renderTimeline();renderTasks();renderContacts();renderData()}
function renderTimeline(){let lanes=[...new Set(data.tasks.map(t=>t.lane))],days=dd(START,TARGET)+4,rogitoIndex=dd(START,TARGET),gridCols=`var(--lane) repeat(${days},var(--day))`;let head=`<div class="tcell" style="position:sticky;left:0;z-index:6;background:#121a2b"></div>`;for(let i=0;i<days;i++){let d=new Date(START+'T12:00');d.setDate(d.getDate()+i);let iso=d.toISOString().slice(0,10);head+=`<div class="tcell ${iso===TARGET?'rogito':''}" style="grid-column:${i+2}">${d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})}${iso===TARGET?' · R':''}</div>`}let html=`<div class="card"><h2>Timeline stile Ableton</h2><p class="small">v1.2.0: modifica con menu a tendina + campo manuale.</p><div class="timelineWrap"><div class="timeline"><div class="trow" style="grid-template-columns:${gridCols}">${head}</div>`;lanes.forEach(l=>{html+=`<div class="trow" style="grid-template-columns:${gridCols}"><div class="laneName">${esc(l)}</div>`;for(let i=0;i<days;i++)html+=`<div class="track ${i===rogitoIndex?'rogitoBg':''}" style="grid-column:${i+2};grid-row:1"></div>`;data.tasks.filter(t=>t.lane===l).forEach(t=>{let s=Math.max(0,Math.min(days-1,dd(START,t.start))),e=Math.max(s,Math.min(days-1,dd(START,t.end))),span=e-s+1,col=t.id==='rogito'?'gold':t.status==='rischio'?'o':t.status==='da_confermare'?'y':['fatto','confermato'].includes(t.status)?'g':t.status==='post'?'x':'r';html+=`<div class="clip ${col}" style="grid-column:${s+2}/span ${span};grid-row:1" onclick="editTask('${t.id}')">${esc(t.title)} · ${fmt(t.end)}</div>`});html+='</div>'});$('timeline').innerHTML=html+'</div></div><p class="small">Tocca un blocco per modificarlo.</p></div>'}
function renderTasks(){$('tasks').innerHTML=`<div class="card"><div class="row"><h2>Attività</h2><button class="btn gold" onclick="newTask()">+ Nuova</button></div><div class="list">${data.tasks.map(card).join('')}</div></div>`}function renderContacts(){$('contacts').innerHTML=`<div class="card"><div class="row"><h2>Anagrafica</h2><button class="btn gold" onclick="newContact()">+ Contatto</button></div><div class="list">${data.contacts.map(x=>`<div class="task"><div class="title">${esc(x.name)}</div><div class="meta">${esc(x.role||'')}</div><p class="small">${esc(x.phone||'Telefono da inserire')} · ${esc(x.email||'Email da inserire')}</p><div class="actions"><button class="btn" onclick="editContact('${x.id}')">Modifica</button></div></div>`).join('')}</div></div>`}function renderData(){$('dataSec').innerHTML=`<div class="card"><h2>Google Sheet Autosync</h2><p class="small" id="syncState">Autosync pronto.</p><div class="grid"><button class="btn gold" onclick="saveCloudAuto(true)">Forza salvataggio</button><button class="btn" onclick="loadCloudManual()">Forza caricamento</button><button class="btn redbtn" onclick="reset()">Reset iniziale</button></div></div>`}
function show(v){document.querySelectorAll('.view').forEach(x=>x.classList.add('hide'));$(v).classList.remove('hide');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));render()}document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>show(b.dataset.v));
function closeModal(){$('editorModal').classList.remove('on')}function uniqueLanes(){return [...new Set([...laneDefaults,...data.tasks.map(t=>t.lane).filter(Boolean)])]}function opts(arr,cur){return arr.map(x=>Array.isArray(x)?`<option value="${esc(x[0])}" ${x[0]===cur?'selected':''}>${esc(x[1])}</option>`:`<option value="${esc(x)}" ${x===cur?'selected':''}>${esc(x)}</option>`).join('')}
function editTask(id){let t=data.tasks.find(x=>x.id===id);if(!t)return;let ks=statusOptions.some(x=>x[0]===t.status),kl=uniqueLanes().includes(t.lane);$('modalTitle').textContent='Modifica attività';$('modalBody').innerHTML=`<div class="formGrid"><label>Nome</label><input id="fTitle" value="${esc(t.title)}"><label>Stato</label><select id="fStatus">${opts(statusOptions,ks?t.status:'')}<option value="custom" ${ks?'':'selected'}>Altro/manuale</option></select><input id="fStatusCustom" placeholder="Stato manuale" value="${ks?'':esc(t.status||'')}"><label>Canale</label><select id="fLane">${opts(uniqueLanes(),kl?t.lane:'')}<option value="custom" ${kl?'':'selected'}>Altro/manuale</option></select><input id="fLaneCustom" placeholder="Canale manuale" value="${kl?'':esc(t.lane||'')}"><label>Contatto</label><select id="fContact">${data.contacts.map(c=>`<option value="${esc(c.id)}" ${c.id===t.contact?'selected':''}>${esc(c.name)}</option>`).join('')}<option value="custom">Nuovo contatto</option></select><input id="fContactCustom" placeholder="Nome nuovo contatto"><div class="two"><div><label>Inizio</label><input id="fStart" type="date" value="${esc(t.start)}"></div><div><label>Fine</label><input id="fEnd" type="date" value="${esc(t.end)}"></div></div><label>Blocca, separati da virgola</label><input id="fBlocks" value="${esc((t.blocks||[]).join(', '))}"><label class="checkRow"><input id="fCritical" type="checkbox" ${t.critical?'checked':''}> Critica / bloccante</label><label>Note</label><textarea id="fNotes">${esc(t.notes||'')}</textarea><label>Messaggio WhatsApp</label><textarea id="fMsg">${esc(t.msg||'')}</textarea><div class="modalActions"><button class="btn redbtn" onclick="closeModal()">Annulla</button><button class="btn gold" onclick="saveTaskForm('${t.id}')">Salva</button></div></div>`;$('editorModal').classList.add('on')}
function saveTaskForm(id){let t=data.tasks.find(x=>x.id===id);let contact=$('fContact').value;if(contact==='custom'){let name=$('fContactCustom').value.trim();if(name){contact='c'+Date.now();data.contacts.push({id:contact,name,role:'',phone:'',email:'',notes:''})}else contact=t.contact}t.title=$('fTitle').value.trim()||t.title;t.status=$('fStatus').value==='custom'?($('fStatusCustom').value.trim()||'da_confermare'):$('fStatus').value;t.lane=$('fLane').value==='custom'?($('fLaneCustom').value.trim()||'Extra'):$('fLane').value;t.contact=contact;t.start=$('fStart').value||t.start;t.end=$('fEnd').value||t.end;t.blocks=$('fBlocks').value.split(',').map(x=>x.trim()).filter(Boolean);t.critical=$('fCritical').checked;t.notes=$('fNotes').value;t.msg=$('fMsg').value;closeModal();markChanged()}
function newTask(){let id='t'+Date.now();data.tasks.push({id,title:'Nuova attività',lane:'Extra',contact:data.contacts[0]?.id||'',start:today(),end:today(),status:'da_confermare',critical:false,blocks:[],sol:0,last:'',notes:'',msg:''});localSave();render();editTask(id)}
function editContact(id){let x=data.contacts.find(c=>c.id===id);let roles=['Geometra','Costruttore','Pulizie','Elettricista','Idraulico','Banca','Notaio','Fornitore','Altro'],kr=roles.includes(x.role);$('modalTitle').textContent='Modifica contatto';$('modalBody').innerHTML=`<div class="formGrid"><label>Nome</label><input id="cName" value="${esc(x.name)}"><label>Ruolo</label><select id="cRole">${opts(roles,kr?x.role:'')}<option value="custom" ${kr?'':'selected'}>Altro/manuale</option></select><input id="cRoleCustom" placeholder="Ruolo manuale" value="${kr?'':esc(x.role||'')}"><label>Telefono</label><input id="cPhone" value="${esc(x.phone||'')}"><label>Email</label><input id="cEmail" value="${esc(x.email||'')}"><label>Note</label><textarea id="cNotes">${esc(x.notes||'')}</textarea><div class="modalActions"><button class="btn redbtn" onclick="closeModal()">Annulla</button><button class="btn gold" onclick="saveContactForm('${x.id}')">Salva</button></div></div>`;$('editorModal').classList.add('on')}
function saveContactForm(id){let x=data.contacts.find(c=>c.id===id);x.name=$('cName').value.trim()||x.name;x.role=$('cRole').value==='custom'?$('cRoleCustom').value.trim():$('cRole').value;x.phone=$('cPhone').value.trim();x.email=$('cEmail').value.trim();x.notes=$('cNotes').value;closeModal();markChanged()}function newContact(){let id='c'+Date.now();data.contacts.push({id,name:'Nuovo contatto',role:'Altro',phone:'',email:'',notes:''});localSave();render();editContact(id)}
function wa(id){let t=data.tasks.find(x=>x.id===id),ct=c(t.contact),msg=encodeURIComponent(t.msg||('Ciao, ti chiedo aggiornamento su '+t.title));let ph=(ct.phone||'').replace(/\D/g,'');window.open(ph?`https://wa.me/${ph}?text=${msg}`:`https://wa.me/?text=${msg}`,'_blank')}function sol(id){let t=data.tasks.find(x=>x.id===id);t.sol=(+t.sol||0)+1;t.last=today();markChanged()}function done(id){let t=data.tasks.find(x=>x.id===id);t.status='fatto';markChanged()}
async function saveCloudAuto(force=false){if(isSaving)return;isSaving=true;localSave();let current=sig();setSync('Salvataggio cloud...');try{await fetch(API,{method:'POST',body:JSON.stringify([{id:'state',type:'full',updated:new Date().toISOString(),json:current}])});lastCloudSig=current;setSync('Salvato automaticamente alle '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));if(force)toast('Salvato su Google Sheet')}catch(e){setSync('Errore cloud');toast(e.message)}finally{isSaving=false}}
async function loadCloud(silent=true){if(isSaving||isLoading)return;isLoading=true;try{let r=await fetch(API),rows=await r.json(),row=Array.isArray(rows)?(rows.find(x=>x.id==='state'&&x.json)||rows[0]):null;if(row&&row.json){let incoming=JSON.parse(row.json),incomingSig=JSON.stringify(incoming);if(!hasLoadedCloud||incomingSig!==lastCloudSig&&Date.now()-lastLocalEdit>2500){data=incoming;hasLoadedCloud=true;lastCloudSig=incomingSig;localSave();render();setSync('Caricato dal cloud alle '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));}}}catch(e){setSync('Errore caricamento')}finally{isLoading=false}}
function loadCloudManual(){loadCloud(false)}function reset(){if(confirm('Ripristino dati iniziali?')){data=clone(seed);markChanged()}}function toast(m){let d=$('syncToast');d.textContent=m;d.style.display='block';setTimeout(()=>d.style.display='none',1800)}
render();loadCloud(true);setInterval(()=>loadCloud(true),12000);
</script></body></html>
