</style></head><body><header><div class="top"><div><h1>Casa Rush <span class="small">v1.5.0</span></h1><div class="sub" id="syncLine">Apertura app...</div></div><div class="right"><button class="theme" id="themeBtn" onclick="toggleTheme()">🌙</button><div class="pill" id="left">-- giorni</div></div></div></header><main><section id="home" class="view grid"></section><section id="timeline" class="view hide"></section><section id="tasks" class="view hide"></section><section id="contacts" class="view hide"></section><section id="dataSec" class="view hide"></section></main><div id="modal" class="modal"><div class="sheet"><div class="row"><div><h2 id="mt">Modifica</h2><div class="sub">Menu + inserimento manuale</div></div><button class="btn" onclick="closeModal()">Chiudi</button></div><div id="mb"></div></div></div><div id="toast"></div><nav><button class="on" data-v="home">🏠<br>Home</button><button data-v="timeline">🎚️<br>Timeline</button><button data-v="tasks">✅<br>Attività</button><button data-v="contacts">👥<br>Contatti</button><button data-v="dataSec">☁️<br>Sync</button></nav><script>
const API='https://script.google.com/macros/s/'+'AKfycbzT6FxIdlwqUHQbvYVpUTPXZUgT3lLDIEUQ9WNejStZcStc_fw2hgOzQufAuQZbgyk/exec',KEY='casaRushFullV2',START='2026-05-03',TARGET='2026-05-30',THEME_KEY='casaRushTheme';
const statusOptions=[['fatto','Fatto'],['confermato','Confermato'],['da_confermare','Da confermare'],['rischio','A rischio'],['bloccante','Bloccante'],['bloccato','Bloccato'],['post','Post-rogito OK']],laneDefaults=['Geometra','Bagni','Idraulico','Elettrico','Luci','Costruttore','Pulizie','Cucina','Notaio','Extra'];
const seed={contacts:[{id:'lorenzo',name:'Lorenzo Severino',role:'Geometra',phone:'',email:'',notes:'APE / mutuo'}],tasks:[{id:'ape',title:'APE energetica',lane:'Geometra',contact:'lorenzo',start:'2026-05-03',end:'2026-05-10',status:'bloccante',critical:true,blocks:['Mutuo','Rogito'],sol:0,last:'',notes:'Documento urgente.',msg:''},{id:'rogito',title:'Rogito',lane:'Notaio',contact:'lorenzo',start:'2026-05-30',end:'2026-05-30',status:'da_confermare',critical:true,blocks:[],sol:0,last:'',notes:'Obiettivo finale.',msg:''}]};
let data=load(),saveTimer=null,isSaving=false,isLoading=false,lastCloudSig='',lastLocalEdit=0,hasLoadedCloud=false;function $(id){return document.getElementById(id)}function clone(o){return JSON.parse(JSON.stringify(o))}function load(){try{return JSON.parse(localStorage.getItem(KEY))||clone(seed)}catch(e){return clone(seed)}}function localSave(){localStorage.setItem(KEY,JSON.stringify(data))}function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function norm(s){return String(s||'').toLowerCase().replace(/[^a-z0-9àèéìòù]+/g,' ').trim()}function today(){return new Date().toISOString().slice(0,10)}function dd(a,b){return Math.round((new Date(b+'T12:00')-new Date(a+'T12:00'))/864e5)}function fmt(d){return d?new Date(d+'T12:00').toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}):'—'}function c(id){return data.contacts.find(x=>x.id===id)||{name:'—',phone:''}}function sig(){return JSON.stringify(data)}
function applyTheme(t){let theme=t||localStorage.getItem(THEME_KEY)||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.dataset.theme=theme;let b=$('themeBtn');if(b)b.textContent=theme==='light'?'☀️':'🌙'}function toggleTheme(){let n=document.documentElement.dataset.theme==='light'?'dark':'light';localStorage.setItem(THEME_KEY,n);applyTheme(n)}applyTheme();
function setSync(t){$('syncLine').textContent=t;let s=$('syncState');if(s)s.textContent=t}function markChanged(){lastLocalEdit=Date.now();localSave();render();setSync('Modifica rilevata: salvataggio automatico...');clearTimeout(saveTimer);saveTimer=setTimeout(saveCloudAuto,800)}
function badge(s){let m={fatto:['green','Fatto'],confermato:['green','Confermato'],da_confermare:['yellow','Da confermare'],rischio:['orange','A rischio'],bloccante:['red','Bloccante'],bloccato:['red','Bloccato'],post:['gray','Post-rogito OK']};let a=m[s]||['yellow',s||'Da definire'];return `<span class="badge ${a[0]}">${a[1]}</span>`}function risk(){let crit=data.tasks.filter(t=>t.critical),open=crit.filter(t=>!['fatto','confermato'].includes(t.status)).length,blk=crit.filter(t=>['bloccante','bloccato','rischio'].includes(t.status)).length,score=Math.max(5,100-open*14-blk*10);return{score,label:score>=75?'Realistico':score>=55?'Realistico ma da presidiare':score>=35?'Rischio alto':'Posticipo probabile',open,blk}}
function depAnalysis(){let tasks=data.tasks||[],out={},inc={},byId={};tasks.forEach(t=>{out[t.id]=new Set();inc[t.id]=new Set();byId[t.id]=t});tasks.forEach(t=>(t.blocks||[]).forEach(b=>{let nb=norm(b),target=tasks.find(x=>x.id!==t.id&&(norm(x.title).includes(nb)||nb.includes(norm(x.title))));if(target){out[t.id].add(target.id);inc[target.id].add(t.id)}}));[['ape','mutuo'],['mutuo','rogito'],['pulizia','cucina'],['sanitari','casa'],['agibil','rogito'],['esterni','consegna']].forEach(([a,b])=>{let A=tasks.find(t=>norm(t.title).includes(a)),B=tasks.find(t=>norm(t.title).includes(b));if(A&&B&&A.id!==B.id){out[A.id].add(B.id);inc[B.id].add(A.id)}});tasks.forEach(a=>tasks.forEach(b=>{if(a.id!==b.id&&a.critical&&a.end&&b.start&&dd(a.end,b.start)>=0&&dd(a.end,b.start)<=2){out[a.id].add(b.id);inc[b.id].add(a.id)}}));let impact={};function walk(id,seen=new Set()){if(seen.has(id))return new Set();seen.add(id);let r=new Set(out[id]||[]);(out[id]||[]).forEach(x=>walk(x,seen).forEach(y=>r.add(y)));return r}tasks.forEach(t=>impact[t.id]=walk(t.id));let top=[...tasks].sort((a,b)=>(impact[b.id]?.size||0)-(impact[a.id]?.size||0)).filter(t=>(impact[t.id]?.size||0)>0).slice(0,3);let chains=top.map(t=>`${t.title} → ${[...impact[t.id]].map(id=>byId[id]?.title).filter(Boolean).slice(0,3).join(' → ')}`);return{out,inc,impact,chains,byId}}
function smartLevel(t,da){let impact=(da.impact[t.id]?.size||0),blocked=(da.inc[t.id]?.size||0),open=!['fatto','confermato'].includes(t.status),late=t.end&&dd(t.end,today())>0;if(['bloccante','bloccato'].includes(t.status)||open&&impact>=2||open&&t.critical&&late)return 'critical';if(t.status==='rischio'||open&&impact>=1||open&&blocked>=1||open&&t.critical)return 'warning';if(['fatto','confermato'].includes(t.status))return 'safe';return 'normal'}
function depText(t,da){let blocks=[...(da.impact[t.id]||[])].map(id=>da.byId[id]?.title).filter(Boolean),blocked=[...(da.inc[t.id]||[])].map(id=>da.byId[id]?.title).filter(Boolean),h='';if(blocks.length)h+=`<div><b>Blocca:</b> ${blocks.map(esc).join(' → ')}</div>`;if(blocked.length)h+=`<div><b>Bloccata da:</b> ${blocked.map(esc).join(', ')}</div>`;return h?`<div class="dep">${h}</div>`:''}
function card(t,da=depAnalysis()){let lvl=smartLevel(t,da),cls=lvl==='critical'?'danger smartCritical':lvl==='warning'?'warn smartWarning':lvl==='safe'?'ok smartSafe':'',impact=(da.impact[t.id]?.size||0),dot=lvl==='critical'?'red':lvl==='warning'?'orange':lvl==='safe'?'green':'gray';return `<div class="task ${cls}"><div class="row"><div><div class="title"><span class="glowDot ${dot}"></span>${esc(t.title)} ${impact?`<span class="badge red">blocca ${impact}</span>`:''}</div><div class="meta">${esc(c(t.contact).name)} · ${fmt(t.start)} → ${fmt(t.end)} · solleciti: ${t.sol||0}</div></div>${badge(t.status)}</div><p class="small">${esc(t.notes||'')}</p>${depText(t,da)}<div class="small">Campo blocca: ${(t.blocks||[]).map(esc).join(', ')||'—'}</div><div class="actions"><button class="btn" onclick="wa('${t.id}')">WhatsApp</button><button class="btn" onclick="sol('${t.id}')">+ Sollecito</button><button class="btn" onclick="done('${t.id}')">Fatto</button><button class="btn" onclick="editTask('${t.id}')">Modifica</button></div></div>`}
function smartSummary(da){let open=data.tasks.filter(t=>!['fatto','confermato'].includes(t.status)),crit=open.filter(t=>smartLevel(t,da)==='critical'),warn=open.filter(t=>smartLevel(t,da)==='warning');let cls=crit.length?'red':warn.length?'orange':'green',txt=crit.length?'Priorità critica: serve azione ora':warn.length?'Situazione da presidiare':'Tutto abbastanza sotto controllo';return `<div class="card"><h2>🚨 Cruscotto intelligente</h2><div class="smartBox ${cls}"><b>${txt}</b><div class="small">Critiche: ${crit.length} · Attenzione: ${warn.length} · Aperte: ${open.length}</div></div>${crit.slice(0,3).map(t=>`<div class="small"><span class="glowDot red"></span>${esc(t.title)} impatta ${da.impact[t.id]?.size||0} attività</div>`).join('')}</div>`}
function render(){if(!$('home'))return;$('left').textContent=Math.max(0,dd(today(),TARGET))+' giorni';let r=risk(),da=depAnalysis(),prio=[...data.tasks].filter(t=>!['fatto','confermato'].includes(t.status)).sort((a,b)=>({critical:3,warning:2,normal:1,safe:0}[smartLevel(b,da)]-({critical:3,warning:2,normal:1,safe:0}[smartLevel(a,da)]))||0);$('home').innerHTML=`<div class="card"><div class="row"><div><h2>Stato rogito</h2><div class="small">Obiettivo 30 maggio · v1.5.0</div></div>${badge(r.score>55?'da_confermare':'rischio')}</div><div class="big">${r.score}%</div><div>${r.label}</div><div class="kpis"><div class="kpi"><b>${r.open}</b><div class="small">critiche aperte</div></div><div class="kpi"><b>${r.blk}</b><div class="small">blocchi/rischi</div></div></div></div>${smartSummary(da)}<div class="card"><h2>🔗 Catena critica</h2>${da.chains.length?da.chains.map(x=>`<div class="chain"><b>${esc(x)}</b></div>`).join(''):'<p class="small">Nessuna catena evidente. Compila “Blocca”.</p>'}</div><div class="card"><h2>Da rompere oggi</h2><div class="list">${prio.slice(0,5).map(t=>card(t,da)).join('')}</div></div>`;renderTimeline();renderTasks();renderContacts();renderData();applyTheme()}
function renderTimeline(){let lanes=[...new Set(data.tasks.map(t=>t.lane))],days=dd(START,TARGET)+4,rogitoIndex=dd(START,TARGET),gridCols=`var(--lane) repeat(${days},var(--day))`,head=`<div class="tcell" style="position:sticky;left:0;z-index:6;background:var(--card2)"></div>`;for(let i=0;i<days;i++){let d=new Date(START+'T12:00');d.setDate(d.getDate()+i);let iso=d.toISOString().slice(0,10);head+=`<div class="tcell ${iso===TARGET?'rogito':''}" style="grid-column:${i+2}">${d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})}${iso===TARGET?' · R':''}</div>`}let html=`<div class="card"><h2>Timeline</h2><p class="small">v1.5.0: evidenziazione intelligente.</p><div class="timelineWrap"><div class="timeline"><div class="trow" style="grid-template-columns:${gridCols}">${head}</div>`;lanes.forEach(l=>{html+=`<div class="trow" style="grid-template-columns:${gridCols}"><div class="laneName">${esc(l)}</div>`;for(let i=0;i<days;i++)html+=`<div class="track ${i===rogitoIndex?'rogitoBg':''}" style="grid-column:${i+2};grid-row:1"></div>`;data.tasks.filter(t=>t.lane===l).forEach(t=>{let s=Math.max(0,Math.min(days-1,dd(START,t.start))),e=Math.max(s,Math.min(days-1,dd(START,t.end))),span=e-s+1,col=t.id==='rogito'?'gold':smartLevel(t,depAnalysis())==='critical'?'r':smartLevel(t,depAnalysis())==='warning'?'o':['fatto','confermato'].includes(t.status)?'g':t.status==='post'?'x':'y';html+=`<div class="clip ${col}" style="grid-column:${s+2}/span ${span}" onclick="editTask('${t.id}')">${esc(t.title)} · ${fmt(t.end)}</div>`});html+='</div>'});$('timeline').innerHTML=html+'</div></div></div>'}
function renderTasks(){let da=depAnalysis();$('tasks').innerHTML=`<div class="card"><div class="row"><h2>Attività</h2><button class="btn gold" onclick="newTask()">+ Nuova</button></div><div class="list">${data.tasks.map(t=>card(t,da)).join('')}</div></div>`}function renderContacts(){$('contacts').innerHTML=`<div class="card"><div class="row"><h2>Anagrafica</h2><button class="btn gold" onclick="newContact()">+ Contatto</button></div><div class="list">${data.contacts.map(x=>`<div class="task"><div class="title">${esc(x.name)}</div><div class="meta">${esc(x.role||'')}</div><p class="small">${esc(x.phone||'Telefono da inserire')} · ${esc(x.email||'Email da inserire')}</p><div class="actions"><button class="btn" onclick="editContact('${x.id}')">Modifica</button></div></div>`).join('')}</div></div>`}function renderData(){$('dataSec').innerHTML=`<div class="card"><h2>Google Sheet Autosync</h2><p class="small" id="syncState">Autosync pronto.</p><div class="grid"><button class="btn gold" onclick="saveCloudAuto(true)">Forza salvataggio</button><button class="btn" onclick="loadCloudManual()">Forza caricamento</button><button class="btn redbtn" onclick="reset()">Reset iniziale</button></div></div>`}
function show(v){document.querySelectorAll('.view').forEach(x=>x.classList.add('hide'));$(v).classList.remove('hide');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));render()}document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>show(b.dataset.v));
function closeModal(){$('modal').classList.remove('on')}function uniqueLanes(){return [...new Set([...laneDefaults,...data.tasks.map(t=>t.lane).filter(Boolean)])]}function opts(arr,cur){return arr.map(x=>Array.isArray(x)?`<option value="${esc(x[0])}" ${x[0]===cur?'selected':''}>${esc(x[1])}</option>`:`<option value="${esc(x)}" ${x===cur?'selected':''}>${esc(x)}</option>`).join('')}
function editTask(id){let t=data.tasks.find(x=>x.id===id);if(!t)return;let ks=statusOptions.some(x=>x[0]===t.status),kl=uniqueLanes().includes(t.lane);$('mt').textContent='Modifica attività';$('mb').innerHTML=`<div class="form"><label>Nome</label><input id="fTitle" value="${esc(t.title)}"><label>Stato</label><select id="fStatus">${opts(statusOptions,ks?t.status:'')}<option value="custom" ${ks?'':'selected'}>Altro/manuale</option></select><input id="fStatusCustom" placeholder="Stato manuale" value="${ks?'':esc(t.status||'')}"><label>Canale</label><select id="fLane">${opts(uniqueLanes(),kl?t.lane:'')}<option value="custom" ${kl?'':'selected'}>Altro/manuale</option></select><input id="fLaneCustom" placeholder="Canale manuale" value="${kl?'':esc(t.lane||'')}"><label>Contatto</label><select id="fContact">${data.contacts.map(c=>`<option value="${esc(c.id)}" ${c.id===t.contact?'selected':''}>${esc(c.name)}</option>`).join('')}<option value="custom">Nuovo contatto</option></select><input id="fContactCustom" placeholder="Nome nuovo contatto"><div class="two"><div><label>Inizio</label><input id="fStart" type="date" value="${esc(t.start)}"></div><div><label>Fine</label><input id="fEnd" type="date" value="${esc(t.end)}"></div></div><label>Blocca, separati da virgola</label><input id="fBlocks" value="${esc((t.blocks||[]).join(', '))}"><label><input id="fCritical" type="checkbox" ${t.critical?'checked':''}> Critica / bloccante</label><label>Note</label><textarea id="fNotes">${esc(t.notes||'')}</textarea><label>Messaggio WhatsApp</label><textarea id="fMsg">${esc(t.msg||'')}</textarea><div class="modalActions"><button class="btn redbtn" onclick="closeModal()">Annulla</button><button class="btn gold" onclick="saveTaskForm('${t.id}')">Salva</button></div></div>`;$('modal').classList.add('on')}
function saveTaskForm(id){let t=data.tasks.find(x=>x.id===id),contact=$('fContact').value;if(contact==='custom'){let name=$('fContactCustom').value.trim();if(name){contact='c'+Date.now();data.contacts.push({id:contact,name,role:'',phone:'',email:'',notes:''})}else contact=t.contact}t.title=$('fTitle').value.trim()||t.title;t.status=$('fStatus').value==='custom'?($('fStatusCustom').value.trim()||'da_confermare'):$('fStatus').value;t.lane=$('fLane').value==='custom'?($('fLaneCustom').value.trim()||'Extra'):$('fLane').value;t.contact=contact;t.start=$('fStart').value||t.start;t.end=$('fEnd').value||t.end;t.blocks=$('fBlocks').value.split(',').map(x=>x.trim()).filter(Boolean);t.critical=$('fCritical').checked;t.notes=$('fNotes').value;t.msg=$('fMsg').value;closeModal();markChanged()}
function newTask(){let id='t'+Date.now();data.tasks.push({id,title:'Nuova attività',lane:'Extra',contact:data.contacts[0]?.id||'',start:today(),end:today(),status:'da_confermare',critical:false,blocks:[],sol:0,last:'',notes:'',msg:''});localSave();render();editTask(id)}
function editContact(id){let x=data.contacts.find(c=>c.id===id),roles=['Geometra','Costruttore','Pulizie','Elettricista','Idraulico','Banca','Notaio','Fornitore','Altro'],kr=roles.includes(x.role);$('mt').textContent='Modifica contatto';$('mb').innerHTML=`<div class="form"><label>Nome</label><input id="cName" value="${esc(x.name)}"><label>Ruolo</label><select id="cRole">${opts(roles,kr?x.role:'')}<option value="custom" ${kr?'':'selected'}>Altro/manuale</option></select><input id="cRoleCustom" placeholder="Ruolo manuale" value="${kr?'':esc(x.role||'')}"><label>Telefono</label><input id="cPhone" value="${esc(x.phone||'')}"><label>Email</label><input id="cEmail" value="${esc(x.email||'')}"><label>Note</label><textarea id="cNotes">${esc(x.notes||'')}</textarea><div class="modalActions"><button class="btn redbtn" onclick="closeModal()">Annulla</button><button class="btn gold" onclick="saveContactForm('${x.id}')">Salva</button></div></div>`;$('modal').classList.add('on')}
function saveContactForm(id){let x=data.contacts.find(c=>c.id===id);x.name=$('cName').value.trim()||x.name;x.role=$('cRole').value==='custom'?$('cRoleCustom').value.trim():$('cRole').value;x.phone=$('cPhone').value.trim();x.email=$('cEmail').value.trim();x.notes=$('cNotes').value;closeModal();markChanged()}function newContact(){let id='c'+Date.now();data.contacts.push({id,name:'Nuovo contatto',role:'Altro',phone:'',email:'',notes:''});localSave();render();editContact(id)}
function wa(id){let t=data.tasks.find(x=>x.id===id),ct=c(t.contact),msg=encodeURIComponent(t.msg||('Ciao, ti chiedo aggiornamento su '+t.title)),ph=(ct.phone||'').replace(/\D/g,'');window.open(ph?`https://wa.me/${ph}?text=${msg}`:`https://wa.me/?text=${msg}`,'_blank')}function sol(id){let t=data.tasks.find(x=>x.id===id);t.sol=(+t.sol||0)+1;t.last=today();markChanged()}function done(id){let t=data.tasks.find(x=>x.id===id);t.status='fatto';markChanged()}
async function saveCloudAuto(force=false){if(isSaving)return;isSaving=true;localSave();let current=sig();setSync('Salvataggio cloud...');try{await fetch(API,{method:'POST',body:JSON.stringify([{id:'state',type:'full',updated:new Date().toISOString(),json:current}])});lastCloudSig=current;setSync('Salvato automaticamente alle '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));if(force)toast('Salvato su Google Sheet')}catch(e){setSync('Errore cloud');toast(e.message)}finally{isSaving=false}}
async function loadCloud(){if(isSaving||isLoading)return;isLoading=true;try{let r=await fetch(API),rows=await r.json(),row=Array.isArray(rows)?(rows.find(x=>x.id==='state'&&x.json)||rows[0]):null;if(row&&row.json){let incoming=JSON.parse(row.json),incomingSig=JSON.stringify(incoming);if(!hasLoadedCloud||incomingSig!==lastCloudSig&&Date.now()-lastLocalEdit>2500){data=incoming;hasLoadedCloud=true;lastCloudSig=incomingSig;localSave();render();setSync('Caricato dal cloud alle '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));}}}catch(e){setSync('Errore caricamento')}finally{isLoading=false}}
function loadCloudManual(){loadCloud()}function reset(){if(confirm('Ripristino dati iniziali?')){data=clone(seed);markChanged()}}function toast(m){let d=$('toast');d.textContent=m;d.style.display='block';setTimeout(()=>d.style.display='none',1800)}
render();loadCloud();setInterval(loadCloud,12000);
</script></body></html>
