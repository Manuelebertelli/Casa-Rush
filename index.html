<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Casa Rush</title><style>
:root{--bg:#070a12;--card:#111827;--card2:#172033;--txt:#f8fafc;--mut:#94a3b8;--gold:#d7b56d;--r:#ff5c7a;--o:#ff9f43;--y:#ffd166;--g:#39d98a}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#25324c,#070a12 58%);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:88px}header{position:sticky;top:0;z-index:10;background:rgba(7,10,18,.88);backdrop-filter:blur(16px);border-bottom:1px solid #ffffff16;padding:14px}h1{margin:0;font-size:24px}.sub{font-size:12px;color:var(--mut)}main{padding:14px;max-width:980px;margin:auto}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.pill,.badge{border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}.pill{border:1px solid #d7b56d88;color:var(--gold);background:#d7b56d18;white-space:nowrap}.card{background:linear-gradient(180deg,#ffffff11,#ffffff06);border:1px solid #ffffff18;border-radius:22px;padding:14px;margin-bottom:12px;box-shadow:0 18px 42px #0008}.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.grid{display:grid;gap:10px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{background:#0005;border:1px solid #ffffff14;border-radius:16px;padding:11px}.kpi b{font-size:24px}.big{font-size:44px;font-weight:950;letter-spacing:-2px}.mut{color:var(--mut)}.small{font-size:12px}.title{font-weight:950}.badge.red{background:#ff5c7a22;color:var(--r)}.badge.orange{background:#ff9f4322;color:var(--o)}.badge.yellow{background:#ffd16622;color:var(--y)}.badge.green{background:#39d98a22;color:var(--g)}.badge.gray{background:#94a3b822;color:#cbd5e1}.btn{border:1px solid #ffffff18;background:var(--card2);color:white;border-radius:14px;padding:10px 12px;font-weight:900}.btn.gold{background:linear-gradient(135deg,#f4d88f,#b88735);color:#160e04}.btn.full{width:100%}.btn.redbtn{background:#ff5c7a22;color:var(--r)}.list{display:grid;gap:10px}.task{background:#0005;border:1px solid #ffffff14;border-radius:18px;padding:12px}.task.danger{border-left:4px solid var(--r)}.task.warn{border-left:4px solid var(--o)}.task.ok{border-left:4px solid var(--g)}.meta{font-size:12px;color:var(--mut);margin-top:3px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.actions .btn{font-size:12px;padding:8px 9px}.timelineWrap{overflow:auto;background:#0005;border:1px solid #ffffff14;border-radius:18px}.timeline{min-width:850px}.days{display:grid;grid-template-columns:138px repeat(28,1fr);background:#0e1525}.days div{font-size:11px;color:var(--mut);padding:8px 3px;text-align:center;border-right:1px solid #ffffff10;border-bottom:1px solid #ffffff14}.lane{display:grid;grid-template-columns:138px 1fr;min-height:50px;border-bottom:1px solid #ffffff12}.laneName{padding:13px 9px;font-size:12px;font-weight:950;background:#ffffff08;border-right:1px solid #ffffff12}.laneGrid{position:relative;background:repeating-linear-gradient(90deg,#ffffff08 0,#ffffff08 1px,transparent 1px,transparent calc(100%/28))}.clip{position:absolute;top:8px;height:34px;border-radius:11px;padding:9px;font-size:11px;font-weight:950;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border:1px solid #ffffff60}.clip.r{background:#ff5c7add}.clip.o{background:#ff9f43dd;color:#170b00}.clip.y{background:#ffd166dd;color:#171000}.clip.g{background:#39d98add;color:#03160c}.clip.x{background:#64748bdd}input,select,textarea{width:100%;background:#0006;color:white;border:1px solid #ffffff18;border-radius:14px;padding:11px;font:inherit}label{display:block;color:var(--mut);font-size:12px;margin:9px 0 5px}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hide{display:none!important}nav{position:fixed;left:0;right:0;bottom:0;background:rgba(7,10,18,.94);backdrop-filter:blur(16px);border-top:1px solid #ffffff14;padding:8px 7px max(8px,env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(5,1fr);gap:5px}nav button{background:transparent;color:var(--mut);border:0;border-radius:14px;padding:8px 2px;font-size:11px;font-weight:950}nav button.on{background:#d7b56d22;color:var(--gold)}@media(min-width:760px){.dash{grid-template-columns:1.1fr .9fr}.kpis{grid-template-columns:repeat(4,1fr)}nav{max-width:620px;margin:auto;left:50%;transform:translateX(-50%);border-radius:24px 24px 0 0}}
</style></head><body><header><div class="top"><div><h1>Casa Rush</h1><div class="sub">Rogito 30 Maggio — control room cantiere</div></div><div class="pill" id="left">-- giorni</div></div></header><main><section id="home" class="view grid dash"></section><section id="timeline" class="view hide"></section><section id="tasks" class="view hide"></section><section id="contacts" class="view hide"></section><section id="dataSec" class="view hide"></section></main><nav><button class="on" data-v="home">🏠<br>Home</button><button data-v="timeline">🎚️<br>Timeline</button><button data-v="tasks">✅<br>Attività</button><button data-v="contacts">👥<br>Contatti</button><button data-v="dataSec">☁️<br>Sync</button></nav><script>
const API='https://script.google.com/macros/s/AKfycbzT6FxIdlwqUHQbvYVpUTPXZUgT3lLDIEUQ9WNejStZcStc_fw2hgOzQufAuQZbgyk/exec',KEY='casaRushFullV1',START='2026-05-03',TARGET='2026-05-30';
const seed={contacts:[{id:'lorenzo',name:'Lorenzo Severino',role:'Geometra ditta / APE',phone:'',email:'',notes:'Senza APE la banca blocca il mutuo.'},{id:'juri',name:'Juri / Costruttore',role:'Esterni, agibilità, posto auto',phone:'',email:'',notes:'Ditta costruttrice.'},{id:'riccardo',name:'Riccardo Bertelli',role:'Pulizie',phone:'',email:'',notes:'Pulizia 2/3 giorni prima della cucina.'},{id:'matteo',name:'Matteo',role:'Punti luce',phone:'',email:'',notes:'Punti luce a parte.'},{id:'mondo',name:'Mondo Convenienza',role:'Mobili bagno',phone:'',email:'',notes:'Montaggio 5 maggio.'},{id:'idraulico',name:'Idraulico ditta',role:'Sanitari',phone:'',email:'',notes:'Nome da recuperare.'},{id:'banca',name:'Banca',role:'Mutuo',phone:'',email:'',notes:'Aspetta APE.'},{id:'cucina',name:'Fornitore cucina',role:'Cucina',phone:'',email:'',notes:'Periodo fine maggio.'}],tasks:[{id:'ape',title:'APE energetica',lane:'Geometra',contact:'lorenzo',start:'2026-05-03',end:'2026-05-10',status:'bloccante',critical:true,blocks:['Mutuo','Rogito'],sol:0,last:'',notes:'Documento più urgente.',msg:'Ciao Lorenzo, ti chiedo un aggiornamento sull’APE della casa. La banca mi ha confermato che senza questo documento la pratica del mutuo rimane bloccata, quindi per noi è urgente in vista del rogito del 30 maggio. Riesci a darmi una previsione concreta su quando sarà pronta? Grazie mille.'},{id:'agib',title:'Agibilità / conferme casa',lane:'Geometra',contact:'juri',start:'2026-05-06',end:'2026-05-20',status:'rischio',critical:true,blocks:['Rogito'],sol:0,last:'',notes:'Chiarire cosa serve davvero prima del rogito.',msg:'Ciao, ti chiedo un aggiornamento sulla parte agibilità/conformità per capire se c’è qualcosa che può bloccare il rogito del 30 maggio. Mi serve avere chiaro cosa è indispensabile prima dell’atto e cosa può eventualmente andare dopo.'},{id:'bagno',title:'Montaggio mobili bagno',lane:'Bagni',contact:'mondo',start:'2026-05-05',end:'2026-05-05',status:'confermato',critical:false,blocks:[],sol:0,last:'',notes:'Mondo Convenienza martedì 5 maggio.',msg:'Ciao, vi chiedo conferma del montaggio mobili bagno previsto per martedì 5 maggio. Grazie.'},{id:'sanitari',title:'Montaggio sanitari',lane:'Idraulico',contact:'idraulico',start:'2026-05-05',end:'2026-05-09',status:'da_confermare',critical:true,blocks:['Casa completa'],sol:0,last:'',notes:'Da confermare con ditta.',msg:'Ciao, riesci a farmi sapere quando vengono montati i sanitari? Mi serve incastrare bene le altre lavorazioni e le pulizie.'},{id:'elettrico',title:'Test impianto elettrico',lane:'Elettrico',contact:'juri',start:'2026-05-05',end:'2026-05-09',status:'da_confermare',critical:true,blocks:['Uso casa'],sol:0,last:'',notes:'Prese installate, test da fare.',msg:'Ciao, mi confermi quando viene fatto il test dell’impianto elettrico questa settimana? Grazie.'},{id:'punti',title:'Punti luce',lane:'Elettrico',contact:'matteo',start:'2026-05-10',end:'2026-05-24',status:'post',critical:false,blocks:[],sol:0,last:'',notes:'Può andare anche dopo rogito.',msg:'Ciao Matteo, quando riusciamo a incastrare i punti luce? Non è bloccante per il rogito, ma vorrei pianificarlo bene.'},{id:'batt',title:'Battiscopa e porte scorrevoli',lane:'Costruttore',contact:'juri',start:'2026-05-06',end:'2026-05-16',status:'da_confermare',critical:false,blocks:['Pulizie finali'],sol:0,last:'',notes:'Meglio prima delle pulizie finali.',msg:'Ciao, riesci ad aggiornarmi su battiscopa e sistemazione porte scorrevoli? Così organizzo bene pulizie e consegne.'},{id:'esterni',title:'Vialetto, posto auto, parete armata',lane:'Costruttore',contact:'juri',start:'2026-05-06',end:'2026-05-25',status:'rischio',critical:true,blocks:['Consegna casa'],sol:0,last:'',notes:'Da capire se indispensabile prima del rogito.',msg:'Ciao, mi aggiorni su vialetto, posto auto/copertura e parete armata sul retro? Mi serve capire cosa verrà chiuso prima del rogito e cosa eventualmente può slittare.'},{id:'pulizia1',title:'Pulizia pre-cucina',lane:'Pulizie',contact:'riccardo',start:'2026-05-23',end:'2026-05-25',status:'da_confermare',critical:false,blocks:['Cucina'],sol:0,last:'',notes:'Da fare 2/3 giorni prima della cucina.',msg:'Ciao Riccardo, dobbiamo incastrare la pulizia pre-cucina 2/3 giorni prima del montaggio. Al momento siamo su fine maggio: ti aggiorno appena ho data precisa, intanto riesci a tenermi una finestra?'},{id:'cucina',title:'Consegna/montaggio cucina',lane:'Cucina',contact:'cucina',start:'2026-05-26',end:'2026-05-29',status:'da_confermare',critical:false,blocks:['Pulizia finale'],sol:0,last:'',notes:'Non bloccante per rogito, ma utile averla.',msg:'Ciao, riesci a darmi una data più precisa per consegna e montaggio cucina? Sto incastrando pulizie e accessi casa.'},{id:'rogito',title:'Rogito',lane:'Notaio',contact:'banca',start:'2026-05-30',end:'2026-05-30',status:'da_confermare',critical:true,blocks:[],sol:0,last:'',notes:'Obiettivo finale.',msg:'Ciao, vi chiedo aggiornamento sulla pratica mutuo in vista del rogito previsto il 30 maggio. Al momento il documento chiave mancante è l’APE.'}]};
let data=load();function clone(o){return JSON.parse(JSON.stringify(o))}function load(){try{return JSON.parse(localStorage.getItem(KEY))||clone(seed)}catch(e){return clone(seed)}}function save(){localStorage.setItem(KEY,JSON.stringify(data));toast('Salvato locale')}function $(id){return document.getElementById(id)}function today(){return new Date().toISOString().slice(0,10)}function dd(a,b){return Math.ceil((new Date(b+'T12:00')-new Date(a+'T12:00'))/864e5)}function fmt(d){return d?new Date(d+'T12:00').toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}):'—'}function c(id){return data.contacts.find(x=>x.id===id)||{name:'—',phone:''}}
function badge(s){let m={fatto:['green','Fatto'],confermato:['green','Confermato'],da_confermare:['yellow','Da confermare'],rischio:['orange','A rischio'],bloccante:['red','Bloccante'],bloccato:['red','Bloccato'],post:['gray','Post-rogito OK']};let a=m[s]||m.da_confermare;return `<span class="badge ${a[0]}">${a[1]}</span>`}function risk(){let crit=data.tasks.filter(t=>t.critical),open=crit.filter(t=>!['fatto','confermato'].includes(t.status)).length,blk=crit.filter(t=>['bloccante','bloccato','rischio'].includes(t.status)).length;let score=Math.max(5,100-open*14-blk*10);let label=score>=75?'Realistico':score>=55?'Realistico ma da presidiare':score>=35?'Rischio alto':'Posticipo probabile';return{score,label,open,blk}}
function card(t){let cls=['bloccante','bloccato'].includes(t.status)?'danger':t.status==='rischio'?'warn':['fatto','confermato'].includes(t.status)?'ok':'';return `<div class="task ${cls}"><div class="row"><div><div class="title">${t.title}</div><div class="meta">${c(t.contact).name} · ${fmt(t.start)} → ${fmt(t.end)} · solleciti: ${t.sol||0}</div></div>${badge(t.status)}</div><p class="small mut">${t.notes||''}</p><div class="small">Blocca: ${(t.blocks||[]).join(', ')||'—'} · Ultimo: ${t.last||'—'}</div><div class="actions"><button class="btn" onclick="wa('${t.id}')">WhatsApp</button><button class="btn" onclick="sol('${t.id}')">+ Sollecito</button><button class="btn" onclick="done('${t.id}')">Fatto</button><button class="btn" onclick="editTask('${t.id}')">Modifica</button></div></div>`}
function render(){ $('left').textContent=Math.max(0,dd(today(),TARGET))+' giorni';let r=risk();$('home').innerHTML=`<div class="card"><div class="row"><div><h2>Stato rogito</h2><div class="small mut">Obiettivo 30 maggio</div></div>${badge(r.score>55?'da_confermare':'rischio')}</div><div class="big">${r.score}%</div><div class="mut">${r.label}</div><div class="kpis"><div class="kpi"><b>${r.open}</b><div class="small mut">critiche aperte</div></div><div class="kpi"><b>${r.blk}</b><div class="small mut">blocchi/rischi</div></div><div class="kpi"><b>${data.tasks.filter(t=>t.status==='fatto').length}</b><div class="small mut">fatte</div></div><div class="kpi"><b>${data.tasks.length}</b><div class="small mut">totali</div></div></div></div><div class="card"><h2>Da rompere oggi</h2><div class="list">${data.tasks.filter(t=>t.critical&&!['fatto','confermato'].includes(t.status)).slice(0,5).map(card).join('')}</div></div><div class="card"><h2>Azioni rapide</h2><div class="grid"><button class="btn gold full" onclick="saveCloud()">☁️ Salva su Google Sheet</button><button class="btn full" onclick="loadCloud()">📥 Carica da Google Sheet</button></div></div>`;renderTimeline();renderTasks();renderContacts();renderData()}
function renderTimeline(){let lanes=[...new Set(data.tasks.map(t=>t.lane))],days=28,head='<div></div>';for(let i=0;i<days;i++){let d=new Date(START+'T12:00');d.setDate(d.getDate()+i);head+=`<div>${d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})}</div>`}let html=`<div class="card"><h2>Timeline stile Ableton</h2><div class="timelineWrap"><div class="timeline"><div class="days">${head}</div>`;lanes.forEach(l=>{html+=`<div class="lane"><div class="laneName">${l}</div><div class="laneGrid">`;data.tasks.filter(t=>t.lane===l).forEach(t=>{let s=Math.max(0,dd(START,t.start)),e=Math.max(s,dd(START,t.end)),left=s/days*100,w=Math.max(1,e-s+1)/days*100,col=t.status==='rischio'?'o':t.status==='da_confermare'?'y':['fatto','confermato'].includes(t.status)?'g':t.status==='post'?'x':'r';html+=`<div class="clip ${col}" style="left:${left}%;width:${w}%" onclick="editTask('${t.id}')">${t.title}</div>`});html+='</div></div>'});$('timeline').innerHTML=html+'</div></div><p class="small mut">Tocca un blocco per modificarlo.</p></div>'}
function renderTasks(){$('tasks').innerHTML=`<div class="card"><div class="row"><h2>Attività</h2><button class="btn gold" onclick="newTask()">+ Nuova</button></div><div class="list">${data.tasks.map(card).join('')}</div></div>`}
function renderContacts(){$('contacts').innerHTML=`<div class="card"><div class="row"><h2>Anagrafica</h2><button class="btn gold" onclick="newContact()">+ Contatto</button></div><div class="list">${data.contacts.map(x=>`<div class="task"><div class="title">${x.name}</div><div class="meta">${x.role}</div><p class="small mut">${x.phone||'Telefono da inserire'} · ${x.email||'Email da inserire'}</p><p class="small mut">${x.notes||''}</p><div class="actions"><button class="btn" onclick="editContact('${x.id}')">Modifica</button></div></div>`).join('')}</div></div>`}
function renderData(){$('dataSec').innerHTML=`<div class="card"><h2>Google Sheet Sync</h2><p class="small mut">Quando tu o Chiara modificate qualcosa: prima caricate dal cloud, poi salvate dopo le modifiche.</p><div class="grid"><button class="btn gold" onclick="saveCloud()">☁️ Salva su Google Sheet</button><button class="btn" onclick="loadCloud()">📥 Carica da Google Sheet</button><button class="btn" onclick="save()">💾 Salva locale</button><button class="btn" onclick="exportJson()">Esporta JSON</button><label class="btn full" style="text-align:center">Importa JSON<input type="file" accept="application/json" onchange="importJson(event)" hidden></label><button class="btn redbtn" onclick="reset()">Reset iniziale</button></div><p class="small mut" id="syncState">API collegata.</p></div>`}
function show(v){document.querySelectorAll('.view').forEach(x=>x.classList.add('hide'));$(v).classList.remove('hide');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));render()}document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>show(b.dataset.v));
async function saveCloud(){save();$('syncState')&&($('syncState').textContent='Salvataggio in corso...');let payload=[{id:'state',type:'full',updated:new Date().toISOString(),json:JSON.stringify(data)}];try{await fetch(API,{method:'POST',body:JSON.stringify(payload)});toast('Salvato su Google Sheet');$('syncState')&&($('syncState').textContent='Salvato su cloud: '+new Date().toLocaleString('it-IT'))}catch(e){toast('Errore salvataggio cloud');alert(e.message)}}
async function loadCloud(){try{let r=await fetch(API);let rows=await r.json();let row=rows.find(x=>x.id==='state'&&x.json)||rows[0];if(row&&row.json){data=JSON.parse(row.json)}else if(Array.isArray(rows)&&rows.length&&rows[0].title){data.tasks=rows.map(x=>({...x,critical:x.critical==='true'||x.critical===true,blocks:typeof x.blocks==='string'?x.blocks.split(',').filter(Boolean):[]}))}save();render();toast('Caricato da Google Sheet')}catch(e){toast('Errore caricamento cloud');alert(e.message)}}
function wa(id){let t=data.tasks.find(x=>x.id===id),ct=c(t.contact),msg=encodeURIComponent(t.msg||('Ciao, ti chiedo aggiornamento su '+t.title));let ph=(ct.phone||'').replace(/\D/g,'');window.open(ph?`https://wa.me/${ph}?text=${msg}`:`https://wa.me/?text=${msg}`,'_blank')}function sol(id){let t=data.tasks.find(x=>x.id===id);t.sol=(+t.sol||0)+1;t.last=today();save();render()}function done(id){let t=data.tasks.find(x=>x.id===id);t.status='fatto';save();render()}
function editTask(id){let t=data.tasks.find(x=>x.id===id);let v=prompt('Nome attività',t.title);if(v===null)return;t.title=v;v=prompt('Stato: fatto, confermato, da_confermare, rischio, bloccante, bloccato, post',t.status);if(v)t.status=v;v=prompt('Canale timeline',t.lane);if(v)t.lane=v;v=prompt('Data inizio YYYY-MM-DD',t.start);if(v)t.start=v;v=prompt('Data fine YYYY-MM-DD',t.end);if(v)t.end=v;v=prompt('Note',t.notes||'');if(v!==null)t.notes=v;save();render()}function newTask(){let id='t'+Date.now();data.tasks.push({id,title:'Nuova attività',lane:'Extra',contact:data.contacts[0].id,start:today(),end:today(),status:'da_confermare',critical:false,blocks:[],sol:0,last:'',notes:'',msg:''});save();editTask(id)}
function editContact(id){let x=data.contacts.find(c=>c.id===id),v=prompt('Nome',x.name);if(v===null)return;x.name=v;x.phone=prompt('Telefono WhatsApp',x.phone||'')||'';x.email=prompt('Email',x.email||'')||'';x.role=prompt('Ruolo',x.role||'')||'';x.notes=prompt('Note',x.notes||'')||'';save();render()}function newContact(){let id='c'+Date.now();data.contacts.push({id,name:'Nuovo contatto',role:'',phone:'',email:'',notes:''});save();editContact(id)}
function exportJson(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='casa-rush-backup.json';a.click()}function importJson(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);save();render()};r.readAsText(f)}function reset(){if(confirm('Ripristino dati iniziali?')){data=clone(seed);save();render()}}function toast(m){let d=document.createElement('div');d.textContent=m;d.style.cssText='position:fixed;left:14px;right:14px;bottom:88px;background:#111827;border:1px solid #ffffff22;border-radius:16px;padding:12px;z-index:20';document.body.appendChild(d);setTimeout(()=>d.remove(),1500)}render();
</script></body></html>
