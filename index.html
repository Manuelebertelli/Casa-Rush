<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Casa Rush</title>
<style>body{font-family:sans-serif;background:#0b0f1a;color:white;padding:20px}button{padding:10px;margin:5px}</style>
</head>
<body>
<h1>Casa Rush (SYNC ATTIVO)</h1>
<p>Versione collegata a Google Sheet</p>
<button onclick="saveToSheet()">💾 Salva su Google Sheet</button>
<button onclick="loadFromSheet()">📥 Carica da Google Sheet</button>
<pre id="out"></pre>
<script>
const API='https://script.google.com/macros/s/AKfycbzT6FxIdlwqUHQbvYVpUTPXZUgT3lLDIEUQ9WNejStZcStc_fw2hgOzQufAuQZbgyk/exec';
let data=[{id:'test',title:'Prova Casa Rush',status:'ok'}];

function saveToSheet(){
fetch(API,{method:'POST',body:JSON.stringify(data)})
.then(r=>r.text())
.then(t=>document.getElementById('out').innerText='SALVATO SU GOOGLE')
}

function loadFromSheet(){
fetch(API)
.then(r=>r.json())
.then(d=>{
 data=d;
 document.getElementById('out').innerText=JSON.stringify(d,null,2);
})
}
</script>
</body>
</html>
