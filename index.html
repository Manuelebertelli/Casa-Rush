<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Casa Rush</title><style>
:root{--bg:#070a12;--card:#111827;--card2:#172033;--txt:#f8fafc;--mut:#94a3b8;--gold:#d7b56d;--r:#ff5c7a;--o:#ff9f43;--y:#ffd166;--g:#39d98a;--day:52px;--lane:112px}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#25324c,#070a12 58%);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:92px}header{position:sticky;top:0;z-index:10;background:rgba(7,10,18,.92);backdrop-filter:blur(16px);border-bottom:1px solid #ffffff16;padding:14px}h1{margin:0;font-size:24px}.sub{font-size:12px;color:var(--mut)}main{padding:14px;max-width:980px;margin:auto}.top,.row{display:flex;justify-content:space-between;gap:10px;align-items:center}.pill,.badge{border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}.pill{border:1px solid #d7b56d88;color:var(--gold);background:#d7b56d18;white-space:nowrap}.card{background:linear-gradient(180deg,#ffffff11,#ffffff06);border:1px solid #ffffff18;border-radius:22px;padding:14px;margin-bottom:12px;box-shadow:0 18px 42px #0008}.grid{display:grid;gap:10px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.kpi{background:#0005;border:1px solid #ffffff14;border-radius:16px;padding:11px}.kpi b{font-size:24px}.big{font-size:44px;font-weight:950;letter-spacing:-2px}.mut{color:var(--mut)}.small{font-size:12px}.title{font-weight:950}.badge.red{background:#ff5c7a22;color:var(--r)}.badge.orange{background:#ff9f4322;color:var(--o)}.badge.yellow{background:#ffd16622;color:var(--y)}.badge.green{background:#39d98a22;color:var(--g)}.badge.gray{background:#94a3b822;color:#cbd5e1}.btn{border:1px solid #ffffff18;background:var(--card2);color:white;border-radius:14px;padding:10px 12px;font-weight:900}.btn.gold{background:linear-gradient(135deg,#f4d88f,#b88735);color:#160e04}.btn.redbtn{background:#ff5c7a22;color:var(--r)}.list{display:grid;gap:10px}.task{background:#0005;border:1px solid #ffffff14;border-radius:18px;padding:12px}.task.danger{border-left:4px solid var(--r)}.task.warn{border-left:4px solid var(--o)}.task.ok{border-left:4px solid var(--g)}.meta{font-size:12px;color:var(--mut);margin-top:3px}.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.actions .btn{font-size:12px;padding:8px 9px}.timelineWrap{overflow:auto;background:#0005;border:1px solid #ffffff14;border-radius:18px}.timeline{width:max-content;min-width:100%}.trow{display:grid;min-height:38px;border-bottom:1px solid #ffffff10}.tcell{border-right:1px solid #ffffff10;border-bottom:1px solid #ffffff14;padding:6px 2px;text-align:center;font-size:10px;color:var(--mut);background:#0e1525}.tcell.rogito{color:#160e04;background:linear-gradient(135deg,#f4d88f,#b88735);font-weight:950}.laneName{padding:9px 7px;font-size:11px;font-weight:950;background:#ffffff08;border-right:1px solid #ffffff12;position:sticky;left:0;z-index:4;backdrop-filter:blur(10px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.track{position:relative;min-height:38px;border-right:1px solid #ffffff10;background:linear-gradient(90deg,#ffffff08 1px,transparent 1px);background-size:var(--day) 100%}.track.rogitoBg{background-color:#d7b56d12}.clip{align-self:center;margin:5px 2px;height:28px;border-radius:9px;padding:7px 8px;font-size:10px;font-weight:950;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;border:1px solid #ffffff60;z-index:3}.clip.r{background:#ff5c7add}.clip.o{background:#ff9f43dd;color:#170b00}.clip.y{background:#ffd166dd;color:#171000}.clip.g{background:#39d98add;color:#03160c}.clip.x{background:#64748bdd}.clip.gold{background:linear-gradient(135deg,#f4d88f,#b88735);color:#160e04;border-color:#ffe9a8}input,select,textarea{width:100%;background:#0006;color:white;border:1px solid #ffffff18;border-radius:14px;padding:11px;font:inherit}label{display:block;color:var(--mut);font-size:12px;margin:9px 0 5px}.hide{display:none!important}nav{position:fixed;left:0;right:0;bottom:0;background:rgba(7,10,18,.94);backdrop-filter:blur(16px);border-top:1px solid #ffffff14;padding:8px 7px max(8px,env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(5,1fr);gap:5px}nav button{background:transparent;color:var(--mut);border:0;border-radius:14px;padding:8px 2px;font-size:11px;font-weight:950}nav button.on{background:#d7b56d22;color:var(--gold)}#syncToast{position:fixed;left:14px;right:14px;bottom:88px;background:#111827;border:1px solid #ffffff22;border-radius:16px;padding:12px;z-index:20;display:none}@media(min-width:760px){.dash{grid-template-columns:1.1fr .9fr}.kpis{grid-template-columns:repeat(4,1fr)}nav{max-width:620px;margin:auto;left:50%;transform:translateX(-50%);border-radius:24px 24px 0 0}}
</style></head><body><header><div class="top"><div><h1>Casa Rush <span class="small mut">v1.1.3</span></h1><div class="sub" id="syncLine">Apertura app...</div></div><div class="pill" id="left">-- giorni</div></div></header><main><section id="home" class="view grid dash"></section><section id="timeline" class="view hide"></section><section id="tasks" class="view hide"></section><section id="contacts" class="view hide"></section><section id="dataSec" class="view hide"></section></main><div id="syncToast"></div><nav><button class="on" data-v="home">🏠<br>Home</button><button data-v="timeline">🎚️<br>Timeline</button><button data-v="tasks">✅<br>Attività</button><button data-v="contacts">👥<br>Contatti</button><button data-v="dataSec">☁️<br>Sync</button></nav><script>
const API='https://script.google.com/macros/s/AKfycbzT6FxIdlwqUHQbvYVpUTPXZUgT3lLDIEUQ9WNejStZcStc_fw2hgOzQufAuQZbgyk/exec',KEY='casaRushFullV2',START='2026-05-03',TARGET='2026-05-30',APP_VERSION='1.1.3';
const seed={contacts:[{id:'lorenzo',name:'Lorenzo Severino',role:'Geometra ditta / APE',phone:'',email:'',notes:'Senza APE la banca blocca il mutuo.'},{id:'juri',name:'Juri / Costruttore',role:'Esterni, agibilità, posto auto',phone:'',email:'',notes:'Ditta costruttrice.'},{id:'riccardo',name:'Riccardo Bertelli',role:'Pulizie',phone:'',email:'',notes:'Pulizia 2/3 giorni prima della cucina.'},{id:'matteo',name:'Matteo',role:'Punti luce',phone:'',email:'',notes:'Punti luce a parte.'},{id:'mondo',name:'Mondo Convenienza',role:'Mobili bagno',phone:'',email:'',notes:'Montaggio 5 maggio.'},{id:'idraulico',name:'Idraulico ditta',role:'Sanitari',phone:'',email:'',notes:'Nome da recuperare.'},{id:'banca',name:'Banca',role:'Mutuo',phone:'',email:'',notes:'Aspetta APE.'},{id:'cucina',name:'Fornitore cucina',role:'Cucina',phone:'',email:'',notes:'Periodo fine maggio.'}],tasks:[{id:'ape',title:'APE energetica',lane:'Geometra',contact:'lorenzo',start:'2026-05-03',end:'2026-05-10',status:'bloccante',critical:true,blocks:['Mutuo','Rogito'],sol:0,last:'',notes:'Documento più urgente.',msg:'Ciao Lorenzo, ti chiedo un aggiornamento sull’APE della casa. La banca mi ha confermato che senza questo documento la pratica del mutuo rimane bloccata, quindi per noi è urgente in vista del rogito del 30 maggio. Riesci a darmi una previsione concreta su quando sarà pronta? Grazie mille.'},{id:'agib',title:'Agibilità / conferme casa',lane:'Geometra',contact:'juri',start:'2026-05-06',end:'2026-05-20',status:'rischio',critical:true,blocks:['Rogito'],sol:0,last:'',notes:'Chiarire cosa serve davvero prima del rogito.',msg:'Ciao, ti chiedo un aggiornamento sulla parte agibilità/conformità per capire se c’è qualcosa che può bloccare il rogito del 30 maggio. Mi serve avere chiaro cosa è indispensabile prima dell’atto e cosa può eventualmente andare dopo.'},{id:'bagno',title:'Montaggio mobili bagno',lane:'Bagni',contact:'mondo',start:'2026-05-05',end:'2026-05-05',status:'confermato',critical:false,blocks:[],sol:0,last:'',notes:'Mondo Convenienza martedì 5 maggio.',msg:'Ciao, vi chiedo conferma del montaggio mobili bagno previsto per martedì 5 maggio. Grazie.'},{id:'sanitari',title:'Montaggio sanitari',lane:'Idraulico',contact:'idraulico',start:'2026-05-05',end:'2026-05-09',status:'da_confermare',critical:true,blocks:['Casa completa'],sol:0,last:'',notes:'Da confermare con ditta.',msg:'Ciao, riesci a farmi sapere quando vengono montati i sanitari? Mi serve incastrare bene le altre lavorazioni e le pulizie.'},{id:'elettrico',title:'Test impianto elettrico',lane:'Elettrico',contact:'juri',start:'2026-05-05',end:'2026-05-09',status:'da_confermare',critical:true,blocks:['Uso casa'],sol:0,last:'',notes:'Prese installate, test da fare.',msg:'Ciao, mi confermi quando viene fatto il test dell’impianto elettrico questa settimana? Grazie.'},{id:'punti',title:'Punti luce',lane:'Elettrico',contact:'matteo',start:'2026-05-10',end:'2026-05-24',status:'post',critical:false,blocks:[],sol:0,last:'',notes:'Può andare anche dopo rogito.',msg:'Ciao Matteo, quando riusciamo a incastrare i punti luce? Non è bloccante per il rogito, ma vorrei pianificarlo bene.'},{id:'batt',title:'Battiscopa e porte scorrevoli',lane:'Costruttore',contact:'juri',start:'2026-05-06',end:'2026-05-16',status:'da_confermare',critical:false,blocks:['Pulizie finali'],sol:0,last:'',notes:'Meglio prima delle pulizie finali.',msg:'Ciao, riesci ad aggiornarmi su battiscopa e sistemazione porte scorrevoli? Così organizzo bene pulizie e consegne.'},{id:'esterni',title:'Vialetto, posto auto, parete armata',lane:'Costruttore',contact:'juri',start:'2026-05-06',end:'2026-05-25',status:'rischio',critical:true,blocks:['Consegna casa'],sol:0,last:'',notes:'Da capire se indispensabile prima del rogito.',msg:'Ciao, mi aggiorni su vialetto, posto auto/copertura e parete armata sul retro? Mi serve capire cosa verrà chiuso prima del rogito e cosa eventualmente può slittare.'},{id:'pulizia1',title:'Pulizia pre-cucina',lane:'Pulizie',contact:'riccardo',start:'2026-05-23',end:'2026-05-25',status:'da_confermare',critical:false,blocks:['Cucina'],sol:0,last:'',notes:'Da fare 2/3 giorni prima della cucina.',msg:'Ciao Riccardo, dobbiamo incastrare la pulizia pre-cucina 2/3 giorni prima del montaggio. Al momento siamo su fine maggio: ti aggiorno appena ho data precisa, intanto riesci a tenermi una finestra?'},{id:'cucina',title:'Consegna/montaggio cucina',lane:'Cucina',contact:'cucina',start:'2026-05-26',end:'2026-05-29',status:'da_confermare',critical:false,blocks:['Pulizia finale'],sol:0,last:'',notes:'Non bloccante per rogito, ma utile averla.',msg:'Ciao, riesci a darmi una data più precisa per consegna e montaggio cucina? Sto incastrando pulizie e accessi casa.'},{id:'rogito',title:'Rogito',lane:'Notaio',contact:'banca',start:'2026-05-30',end:'2026-05-30',status:'da_confermare',critical:true,blocks:[],sol:0,last:'',notes:'Obiettivo finale.',msg:'Ciao, vi chiedo aggiornamento sulla pratica mutuo in vista del rogito previsto il 30 maggio. Al momento il documento chiave mancante è l’APE.'}]};
let data=load(),saveTimer=null,isSaving=false,isLoading=false,lastCloudSig='',lastLocalEdit=0,hasLoadedCloud=false;function clone(o){return JSON.parse(JSON.stringify(o))}function load(){try{return JSON.parse(localStorage.getItem(KEY))||clone(seed)}catch(e){return clone(seed)}}function localSave(){localStorage.setItem(KEY,JSON.stringify(data))}function markChanged(){lastLocalEdit=Date.now();localSave();render();scheduleCloudSave()}function scheduleCloudSave(){setSync('Modifica rilevata: salvataggio automatico...');clearTimeout(saveTimer);saveTimer=setTimeout(saveCloudAuto,800)}function setSync(t){$('syncLine').textContent=t;let s=$('syncState');if(s)s.textContent=t}function $(id){return document.getElementById(id)}function today(){return new Date().toISOString().slice(0,10)}function dd(a,b){return Math.round((new Date(b+'T12:00')-new Date(a+'T12:00'))/864e5)}function fmt(d){return d?new Date(d+'T12:00').toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'}):'—'}function c(id){return data.contacts.find(x=>x.id===id)||{name:'—',phone:''}}function sig(){return JSON.stringify(data)}
function badge(s){let m={fatto:['green','Fatto'],confermato:['green','Confermato'],da_confermare:['yellow','Da confermare'],rischio:['orange','A rischio'],bloccante:['red','Bloccante'],bloccato:['red','Bloccato'],post:['gray','Post-rogito OK']};let a=m[s]||m.da_confermare;return `<span class="badge ${a[0]}">${a[1]}</span>`}function risk(){let crit=data.tasks.filter(t=>t.critical),open=crit.filter(t=>!['fatto','confermato'].includes(t.status)).length,blk=crit.filter(t=>['bloccante','bloccato','rischio'].includes(t.status)).length;let score=Math.max(5,100-open*14-blk*10);let label=score>=75?'Realistico':score>=55?'Realistico ma da presidiare':score>=35?'Rischio alto':'Posticipo probabile';return{score,label,open,blk}}
function card(t){let cls=['bloccante','bloccato'].includes(t.status)?'danger':t.status==='rischio'?'warn':['fatto','confermato'].includes(t.status)?'ok':'';return `<div class="task ${cls}"><div class="row"><div><div class="title">${t.title}</div><div class="meta">${c(t.contact).name} · ${fmt(t.start)} → ${fmt(t.end)} · solleciti: ${t.sol||0}</div></div>${badge(t.status)}</div><p class="small mut">${t.notes||''}</p><div class="small">Blocca: ${(t.blocks||[]).join(', ')||'—'} · Ultimo: ${t.last||'—'}</div><div class="actions"><button class="btn" onclick="wa('${t.id}')">WhatsApp</button><button class="btn" onclick="sol('${t.id}')">+ Sollecito</button><button class="btn" onclick="done('${t.id}')">Fatto</button><button class="btn" onclick="editTask('${t.id}')">Modifica</button></div></div>`}
function render(){if(!$('home'))return;$('left').textContent=Math.max(0,dd(today(),TARGET))+' giorni';let r=risk();$('home').innerHTML=`<div class="card"><div class="row"><div><h2>Stato rogito</h2><div class="small mut">Obiettivo 30 maggio · v${APP_VERSION}</div></div>${badge(r.score>55?'da_confermare':'rischio')}</div><div class="big">${r.score}%</div><div class="mut">${r.label}</div><div class="kpis"><div class="kpi"><b>${r.open}</b><div class="small mut">critiche aperte</div></div><div class="kpi"><b>${r.blk}</b><div class="small mut">blocchi/rischi</div></div><div class="kpi"><b>${data.tasks.filter(t=>t.status==='fatto').length}</b><div class="small mut">fatte</div></div><div class="kpi"><b>${data.tasks.length}</b><div class="small mut">totali</div></div></div></div><div class="card"><h2>Da rompere oggi</h2><div class="list">${data.tasks.filter(t=>t.critical&&!['fatto','confermato'].includes(t.status)).slice(0,5).map(card).join('')}</div></div><div class="card"><h2>Sync automatico</h2><p class="small mut">Apri, lavori e basta. Ogni modifica viene salvata da sola su Google Sheet.</p><div class="grid"><button class="btn" onclick="loadCloudManual()">Forza aggiornamento cloud</button><button class="btn gold" onclick="saveCloudAuto(true)">Forza salvataggio ora</button></div></div>`;renderTimeline();renderTasks();renderContacts();renderData()}
function renderTimeline(){let lanes=[...new Set(data.tasks.map(t=>t.lane))];let days=dd(START,TARGET)+4;let rogitoIndex=dd(START,TARGET);let gridCols=`var(--lane) repeat(${days},var(--day))`;let head=`<div class="tcell" style="position:sticky;left:0;z-index:6;background:#121a2b"></div>`;for(let i=0;i<days;i++){let d=new Date(START+'T12:00');d.setDate(d.getDate()+i);let iso=d.toISOString().slice(0,10);head+=`<div class="tcell ${iso===TARGET?'rogito':''}" style="grid-column:${i+2}">${d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})}${iso===TARGET?' · R':''}</div>`}let html=`<div class="card"><h2>Timeline stile Ableton</h2><p class="small mut">v1.1.3: righe compatte, colonne giorno fisse. La colonna oro è il 30/05.</p><div class="timelineWrap"><div class="timeline"><div class="trow" style="grid-template-columns:${gridCols}">${head}</div>`;lanes.forEach(l=>{html+=`<div class="trow" style="grid-template-columns:${gridCols}"><div class="laneName">${l}</div>`;for(let i=0;i<days;i++){html+=`<div class="track ${i===rogitoIndex?'rogitoBg':''}" style="grid-column:${i+2}"></div>`}data.tasks.filter(t=>t.lane===l).forEach(t=>{let s=Math.max(0,Math.min(days-1,dd(START,t.start)));let e=Math.max(s,Math.min(days-1,dd(START,t.end)));let span=e-s+1;let col=t.id==='rogito'?'gold':t.status==='rischio'?'o':t.status==='da_confermare'?'y':['fatto','confermato'].includes(t.status)?'g':t.status==='post'?'x':'r';html+=`<div class="clip ${col}" style="grid-column:${s+2}/span ${span};grid-row:1" onclick="editTask('${t.id}')">${t.title} · ${fmt(t.end)}</div>`});html+='</div>'});$('timeline').innerHTML=html+'</div></div><p class="small mut">Tocca un blocco per modificarlo.</p></div>'}
function renderTasks(){$('tasks').innerHTML=`<div class="card"><div class="row"><h2>Attività</h2><button class="btn gold" onclick="newTask()">+ Nuova</button></div><div class="list">${data.tasks.map(card).join('')}</div></div>`}function renderContacts(){$('contacts').innerHTML=`<div class="card"><div class="row"><h2>Anagrafica</h2><button class="btn gold" onclick="newContact()">+ Contatto</button></div><div class="list">${data.contacts.map(x=>`<div class="task"><div class="title">${x.name}</div><div class="meta">${x.role}</div><p class="small mut">${x.phone||'Telefono da inserire'} · ${x.email||'Email da inserire'}</p><p class="small mut">${x.notes||''}</p><div class="actions"><button class="btn" onclick="editContact('${x.id}')">Modifica</button></div></div>`).join('')}</div></div>`}function renderData(){$('dataSec').innerHTML=`<div class="card"><h2>Google Sheet Autosync</h2><p class="small mut">Autosave attivo. Ogni 12 secondi controlla il cloud.</p><div class="grid"><button class="btn gold" onclick="saveCloudAuto(true)">Forza salvataggio</button><button class="btn" onclick="loadCloudManual()">Forza caricamento</button><button class="btn" onclick="exportJson()">Esporta JSON</button><label class="btn full" style="text-align:center">Importa JSON<input type="file" accept="application/json" onchange="importJson(event)" hidden></label><button class="btn redbtn" onclick="reset()">Reset iniziale</button></div><p class="small mut" id="syncState">Autosync pronto.</p></div>`}
function show(v){document.querySelectorAll('.view').forEach(x=>x.classList.add('hide'));$(v).classList.remove('hide');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));render()}document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>show(b.dataset.v));
async function saveCloudAuto(force=false){if(isSaving)return;isSaving=true;localSave();let current=sig();setSync('Salvataggio cloud...');let payload=[{id:'state',type:'full',updated:new Date().toISOString(),json:current}];try{await fetch(API,{method:'POST',body:JSON.stringify(payload)});lastCloudSig=current;setSync('Salvato automaticamente alle '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));if(force)toast('Salvato su Google Sheet')}catch(e){setSync('Errore salvataggio cloud');toast('Errore cloud: '+e.message)}finally{isSaving=false}}
async function loadCloud(silent=true){if(isSaving||isLoading)return;isLoading=true;try{let r=await fetch(API);let rows=await r.json();let row=Array.isArray(rows)?(rows.find(x=>x.id==='state'&&x.json)||rows[0]):null;if(row&&row.json){let incoming=JSON.parse(row.json);let incomingSig=JSON.stringify(incoming);if(!hasLoadedCloud){data=incoming;hasLoadedCloud=true;lastCloudSig=incomingSig;localSave();render();setSync('Caricato dal cloud alle '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));}else if(incomingSig!==lastCloudSig&&Date.now()-lastLocalEdit>2500){data=incoming;lastCloudSig=incomingSig;localSave();render();setSync('Aggiornato dal cloud alle '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));if(!silent)toast('Caricato da Google Sheet')}}else{setSync('Cloud vuoto: salvo i dati iniziali');saveCloudAuto()}}catch(e){setSync('Errore caricamento cloud');if(!silent)alert(e.message)}finally{isLoading=false}}
function loadCloudManual(){loadCloud(false)}function wa(id){let t=data.tasks.find(x=>x.id===id),ct=c(t.contact),msg=encodeURIComponent(t.msg||('Ciao, ti chiedo aggiornamento su '+t.title));let ph=(ct.phone||'').replace(/\D/g,'');window.open(ph?`https://wa.me/${ph}?text=${msg}`:`https://wa.me/?text=${msg}`,'_blank')}function sol(id){let t=data.tasks.find(x=>x.id===id);t.sol=(+t.sol||0)+1;t.last=today();markChanged()}function done(id){let t=data.tasks.find(x=>x.id===id);t.status='fatto';markChanged()}
function editTask(id){let t=data.tasks.find(x=>x.id===id);let v=prompt('Nome attività',t.title);if(v===null)return;t.title=v;v=prompt('Stato: fatto, confermato, da_confermare, rischio, bloccante, bloccato, post',t.status);if(v)t.status=v;v=prompt('Canale timeline',t.lane);if(v)t.lane=v;v=prompt('Data inizio YYYY-MM-DD',t.start);if(v)t.start=v;v=prompt('Data fine YYYY-MM-DD',t.end);if(v)t.end=v;v=prompt('Note',t.notes||'');if(v!==null)t.notes=v;markChanged()}function newTask(){let id='t'+Date.now();data.tasks.push({id,title:'Nuova attività',lane:'Extra',contact:data.contacts[0].id,start:today(),end:today(),status:'da_confermare',critical:false,blocks:[],sol:0,last:'',notes:'',msg:''});markChanged();editTask(id)}function editContact(id){let x=data.contacts.find(c=>c.id===id),v=prompt('Nome',x.name);if(v===null)return;x.name=v;x.phone=prompt('Telefono WhatsApp',x.phone||'')||'';x.email=prompt('Email',x.email||'')||'';x.role=prompt('Ruolo',x.role||'')||'';x.notes=prompt('Note',x.notes||'')||'';markChanged()}function newContact(){let id='c'+Date.now();data.contacts.push({id,name:'Nuovo contatto',role:'',phone:'',email:'',notes:''});markChanged();editContact(id)}function exportJson(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='casa-rush-backup.json';a.click()}function importJson(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);markChanged()};r.readAsText(f)}function reset(){if(confirm('Ripristino dati iniziali?')){data=clone(seed);markChanged()}}function toast(m){let d=$('syncToast');d.textContent=m;d.style.display='block';setTimeout(()=>d.style.display='none',1800)}
render();loadCloud(true);setInterval(()=>loadCloud(true),12000);
</script></body></html>
