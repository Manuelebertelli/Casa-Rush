<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Casa Rush</title>
</head>
<body>
<script>
async function loadLatestVersion(){
  try{
    const res = await fetch('versions.json?ts=' + Date.now());
    const cfg = await res.json();
    const file = cfg.active;
    const html = await fetch(file + '?ts=' + Date.now()).then(r=>r.text());
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.body.innerHTML = `
      <h1 style="font-family:sans-serif">⚠️ Errore caricamento</h1>
      <p>Controlla versions.json o i file versione.</p>
      <pre>${e}</pre>
    `;
  }
}
loadLatestVersion();
</script>
</body>
</html>
